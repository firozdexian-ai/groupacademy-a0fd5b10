    <!-- PWA — host-aware: swap to Gro10x manifest before paint when on a Gro10x host -->
    <link id="app-manifest" rel="manifest" href="/manifest.json" />
    <meta id="app-theme" name="theme-color" content="#0FA0CE" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta id="app-status-bar" name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta id="app-title" name="apple-mobile-web-app-title" content="GroUp Academy" />
    <script>
      (function () {
        try {
          var h = location.hostname.toLowerCase();
          var override = false;
          try {
            if (location.search.indexOf("gro10x=1") !== -1) localStorage.setItem("gro10x:host-override", "1");
            if (location.search.indexOf("gro10x=0") !== -1) localStorage.removeItem("gro10x:host-override");
            override = localStorage.getItem("gro10x:host-override") === "1";
          } catch (e) {}
          var isGro10x = override || h.indexOf("gro10x.") === 0 || h.indexOf(".gro10x.") !== -1;
          if (isGro10x) {
            document.getElementById("app-manifest").setAttribute("href", "/gro10x/manifest.webmanifest");
            document.getElementById("app-theme").setAttribute("content", "#0B1220");
            document.getElementById("app-status-bar").setAttribute("content", "black-translucent");
            document.getElementById("app-title").setAttribute("content", "Gro10x");
            document.title = "Gro10x — Professional AI";
          }
        } catch (e) {}
      })();
    </script>
