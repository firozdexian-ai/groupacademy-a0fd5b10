<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — GroUp Academy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
      background: #0a0a0f;
      color: #f0f0f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 20px;
      background: linear-gradient(135deg, #2A7DDE 0%, #33E1E4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    h1 {
      font-family: 'Manrope', system-ui, sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #2A7DDE, #33E1E4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #a0a0b0;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .retry-btn {
      display: inline-block;
      padding: 0.875rem 2rem;
      background: #2A7DDE;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }
    .retry-btn:hover { background: #1f6bc4; }
    .tips {
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      text-align: left;
    }
    .tips h3 { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: #ccc; }
    .tips ul { list-style: none; padding: 0; }
    .tips li { padding: 0.25rem 0; font-size: 0.85rem; color: #888; }
    .tips li::before { content: "• "; color: #33E1E4; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry — your progress is saved. Reconnect and pick up right where you left off.</p>
    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
    <div class="tips">
      <h3>Quick tips</h3>
      <ul>
        <li>Check your Wi-Fi or mobile data</li>
        <li>Move closer to your router</li>
        <li>Toggle airplane mode on and off</li>
      </ul>
    </div>
  </div>
</body>
</html>
